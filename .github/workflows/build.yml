name: Build APK (Stable No-SDK)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev liblzma-dev libsqlite3-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel cython buildozer

      - name: Force non-interactive Android build
        run: |
          export ANDROID_ACCEPT_LICENSES=yes
          export BUILDOZER_ALLOW_SDK_UPGRADE=0
          export P4A_NO_PROMPT=1
          export GRADLE_OPTS="-Dorg.gradle.daemon=false"
          buildozer android clean || true
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk      - 

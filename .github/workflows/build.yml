name: Build APK (Docker p4a stable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/android-sdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install project deps
        run: |
          pip install --upgrade pip
          pip install cython kivy python-for-android

      - name: Build APK
        run: |
          p4a apk \
            --private $PWD \
            --package org.gematrix.app \
            --name Gematrix \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch arm64-v8a \
            --ndk-api 21 \
            --android-api 34 \
            --output-dir bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

name: Build APK (Clean Kivy)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev liblzma-dev libsqlite3-dev

      - name: Install Python tools
        run: |
          pip install --upgrade pip setuptools wheel cython
          pip install buildozer

      - name: Initialize Buildozer (first run safe)
        run: |
          buildozer init || true

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gematrix-apk
          path: bin/*.apk

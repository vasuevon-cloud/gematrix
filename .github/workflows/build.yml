name: Build APK (p4a Kivy)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk build-essential \
          libffi-dev libssl-dev liblzma-dev libsqlite3-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel cython kivy
          pip install python-for-android

      - name: Build APK with p4a
        run: |
          p4a apk \
            --private $PWD \
            --package org.gematrix.app \
            --name Gematrix \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch arm64-v8a \
            --ndk-api 21 \
            --output-dir bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
